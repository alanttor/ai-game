<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Alchemy | Creative Coding</title>
    <style>
        /* ==========================================
           1. 基础重置 & 全局样式
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #050010 0%, #0a001a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* WebGL 容器 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto; /* 允许鼠标事件穿透以捕获坐标 */
        }

        /* ==========================================
           2. UI 界面层 (排版 & 交互)
           ========================================== */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* 让画布接管多数鼠标事件 */
        }

        /* 核心标题：反色混合 */
        h1.title {
            font-size: clamp(4rem, 10vw, 12rem);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.02em;
            line-height: 1;
            mix-blend-mode: exclusion;
            text-align: center;
            user-select: none;
            /* 轻微的发光让 exclusion 效果在暗部更明显 */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* 极简幽灵按钮 */
        .enter-btn {
            pointer-events: auto; /* 恢复按钮的交互 */
            margin-top: 60px;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s ease, transform 0.4s ease;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .enter-btn:hover {
            border-color: rgba(0, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 255, 255, 0.3);
        }

        .enter-btn:hover::before {
            left: 200%;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h1 class="title">DIGITAL<br>ALCHEMY</h1>
        <button class="enter-btn">ENTER SYSTEM</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * ==========================================
         * 核心引擎设定: 数字炼金术系统
         * ==========================================
         */

        // 场景配置
        const CONFIG = {
            particleCount: 350,       // 粒子数量
            connectDistance: 120,     // 粒子间连线的最远距离
            mouseRepelRadius: 150,    // 鼠标排斥力场的半径
            mouseRepelForce: 3.5,     // 鼠标排斥的力度
            springForce: 0.05,        // 弹簧恢复力
            parallaxFactor: 0.05      // 视差滚动的强度
        };

        let scene, camera, renderer;
        let particles, lines;

        // 性能优化：Buffer 数据
        let particlePositions, originalPositions, particleVelocities;
        let linePositions, lineColors;

        // 交互状态
        let mouse = new THREE.Vector2(-9999, -9999);
        let targetMouse = new THREE.Vector2(0, 0);
        let mouse3D = new THREE.Vector3(-9999, -9999, 0);

        // 颜色插值基准
        const colorPurple = new THREE.Color(0x8a2be2); // 深紫
        const colorCyan = new THREE.Color(0x00ffff);   // 赛博青

        init();
        animate();

        function init() {
            // 1. 初始化基础场景
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            // 添加轻微雾化增加深度感
            scene.fog = new THREE.FogExp2(0x050010, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 600;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制最高dpr以保障性能
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 2. 核心架构：创建发光纹理 (纯代码生成，无外部图片)
            const glowTexture = createGlowTexture();

            // 3. 实例化粒子与线条系统
            createParticles(glowTexture);
            createLines();

            // 4. 事件监听
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            // 触摸屏支持
            document.addEventListener('touchmove', onTouchMove, { passive: true });
        }

        // ==========================================
        // 纹理生成：数字炼金术的灵魂发光点
        // ==========================================
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            const size = 64;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const center = size / 2;
            const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);

            // 核心高亮，边缘散开
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.1, 'rgba(0, 255, 255, 0.8)');
            gradient.addColorStop(0.4, 'rgba(138, 43, 226, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // 系统 A：粒子群构建
        // ==========================================
        function createParticles(texture) {
            const geometry = new THREE.BufferGeometry();

            particlePositions = new Float32Array(CONFIG.particleCount * 3);
            originalPositions = new Float32Array(CONFIG.particleCount * 3);
            particleVelocities = new Float32Array(CONFIG.particleCount * 3);

            // 在3D空间内随机分布粒子
            const range = 800;
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const x = (Math.random() - 0.5) * range * 2;
                const y = (Math.random() - 0.5) * range * 1.5;
                const z = (Math.random() - 0.5) * range;

                particlePositions[i * 3] = x;
                particlePositions[i * 3 + 1] = y;
                particlePositions[i * 3 + 2] = z;

                originalPositions[i * 3] = x;
                originalPositions[i * 3 + 1] = y;
                originalPositions[i * 3 + 2] = z;

                // 赋予微小的初始漂移速度
                particleVelocities[i * 3] = (Math.random() - 0.5) * 0.5;
                particleVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
                particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

            const material = new THREE.PointsMaterial({
                size: 25,
                map: texture,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, // 加色混合，叠加发光
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // ==========================================
        // 系统 B：动态连接线构建
        // ==========================================
        function createLines() {
            const geometry = new THREE.BufferGeometry();

            // 计算最大可能的连线数量组合 (N * (N - 1) / 2)
            // 出于性能考虑，我们限制一个安全的最大 Buffer 值
            const maxLines = 15000;

            linePositions = new Float32Array(maxLines * 6); // 每条线2个点，每个点3个坐标
            lineColors = new Float32Array(maxLines * 6);    // 每条线2个点，每个点3个颜色值RGB

            geometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

            const material = new THREE.LineBasicMaterial({
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.4,
                depthWrite: false
            });

            lines = new THREE.LineSegments(geometry, material);
            scene.add(lines);
        }

        // ==========================================
        // 交互逻辑
        // ==========================================
        function onMouseMove(event) {
            // 归一化鼠标坐标 (-1 to +1) 用于视差
            targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // 将鼠标投影到 3D 空间内的特定 Z 平面上 (Z=0)
            const vector = new THREE.Vector3(targetMouse.x, targetMouse.y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            mouse3D.copy(camera.position).add(dir.multiplyScalar(distance));
        }

        function onTouchMove(event) {
            if(event.touches.length > 0) {
                targetMouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                targetMouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;

                const vector = new THREE.Vector3(targetMouse.x, targetMouse.y, 0.5);
                vector.unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                const distance = -camera.position.z / dir.z;
                mouse3D.copy(camera.position).add(dir.multiplyScalar(distance));
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // 核心渲染循环 (物理 + 绘制)
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // 1. 平滑鼠标插值 (视差滚动)
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;
            camera.position.x += (mouse.x * 200 - camera.position.x) * CONFIG.parallaxFactor;
            camera.position.y += (mouse.y * 200 - camera.position.y) * CONFIG.parallaxFactor;
            camera.lookAt(scene.position);

            // 基于全局鼠标位置的动态颜色主题
            const themeRatio = (mouse.x + 1) / 2; // 0 to 1
            const currentThemeColor = new THREE.Color().copy(colorPurple).lerp(colorCyan, themeRatio);

            // 2. 物理演算：计算粒子位置
            let vertexIndex = 0;
            let lineIndex = 0;
            let colorIndex = 0;

            const positions = particles.geometry.attributes.position.array;

            // 临时向量用于计算
            const pPos = new THREE.Vector3();
            const oPos = new THREE.Vector3();

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const i3 = i * 3;
                pPos.set(positions[i3], positions[i3 + 1], positions[i3 + 2]);
                oPos.set(originalPositions[i3], originalPositions[i3 + 1], originalPositions[i3 + 2]);

                // 持续的微弱漂移运动
                pPos.x += particleVelocities[i3];
                pPos.y += particleVelocities[i3 + 1];
                pPos.z += particleVelocities[i3 + 2];

                // 如果超出极小范围，反转漂移速度
                if (pPos.distanceTo(oPos) > 50) {
                    particleVelocities[i3] *= -0.98;
                    particleVelocities[i3 + 1] *= -0.98;
                    particleVelocities[i3 + 2] *= -0.98;
                }

                // 鼠标力场排斥逻辑
                const distToMouse = pPos.distanceTo(mouse3D);
                if (distToMouse < CONFIG.mouseRepelRadius) {
                    const force = (CONFIG.mouseRepelRadius - distToMouse) / CONFIG.mouseRepelRadius;
                    const pushDir = pPos.clone().sub(mouse3D).normalize();
                    pPos.add(pushDir.multiplyScalar(force * CONFIG.mouseRepelForce));
                }

                // 弹簧回位逻辑 (将排斥后的粒子慢慢拉回原本的漂移中心)
                const pullForce = oPos.clone().sub(pPos).multiplyScalar(CONFIG.springForce);
                pPos.add(pullForce);

                // 更新 Buffer
                positions[i3] = pPos.x;
                positions[i3 + 1] = pPos.y;
                positions[i3 + 2] = pPos.z;

                // 3. 生成连线 (Plexus 效果)
                // 仅与它后面的粒子进行计算以避免重复连线
                for (let j = i + 1; j < CONFIG.particleCount; j++) {
                    const j3 = j * 3;
                    const dx = positions[i3] - positions[j3];
                    const dy = positions[i3 + 1] - positions[j3 + 1];
                    const dz = positions[i3 + 2] - positions[j3 + 2];
                    const distSq = dx * dx + dy * dy + dz * dz; // 距离平方优化

                    if (distSq < CONFIG.connectDistance * CONFIG.connectDistance) {
                        // 距离越近，或者离鼠标越近，线越亮 (通过修改颜色亮度体现能量激活)
                        const dist = Math.sqrt(distSq);
                        const alpha = 1.0 - (dist / CONFIG.connectDistance);

                        // 能量激活：如果两点中心离鼠标很近，瞬间提亮并偏向青色
                        const midX = (positions[i3] + positions[j3]) / 2;
                        const midY = (positions[i3+1] + positions[j3+1]) / 2;
                        const midZ = (positions[i3+2] + positions[j3+2]) / 2;
                        const distToMid = mouse3D.distanceTo(new THREE.Vector3(midX, midY, midZ));

                        let lineColor = currentThemeColor.clone();
                        if (distToMid < 200) {
                            const energy = 1 - (distToMid / 200);
                            lineColor.lerp(colorCyan, energy); // 注入赛博青色能量
                            lineColor.multiplyScalar(1 + energy * 2); // 提高亮度
                        }

                        // 填充线的起始点
                        linePositions[lineIndex++] = positions[i3];
                        linePositions[lineIndex++] = positions[i3 + 1];
                        linePositions[lineIndex++] = positions[i3 + 2];

                        lineColors[colorIndex++] = lineColor.r * alpha;
                        lineColors[colorIndex++] = lineColor.g * alpha;
                        lineColors[colorIndex++] = lineColor.b * alpha;

                        // 填充线的终点
                        linePositions[lineIndex++] = positions[j3];
                        linePositions[lineIndex++] = positions[j3 + 1];
                        linePositions[lineIndex++] = positions[j3 + 2];

                        lineColors[colorIndex++] = lineColor.r * alpha;
                        lineColors[colorIndex++] = lineColor.g * alpha;
                        lineColors[colorIndex++] = lineColor.b * alpha;
                    }
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;

            lines.geometry.setDrawRange(0, lineIndex / 3);
            lines.geometry.attributes.position.needsUpdate = true;
            lines.geometry.attributes.color.needsUpdate = true;

            // 渲染整个场景
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
