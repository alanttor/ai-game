<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 互动项目展示</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 深色主题（默认） */
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-nav: rgba(0,0,0,0.2);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #fff;
            --text-secondary: #8892b0;
            --accent: #00d4ff;
            --accent-gradient: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff006e);
        }
        
        /* 浅色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #cbd5e1 100%);
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-nav: rgba(255,255,255,0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }
        
        body {
            min-height: 100vh;
            background: var(--bg-primary);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text-primary);
            padding: 30px 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; position: relative; }
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--text-secondary); font-size: 1em; }
        .stats { color: var(--accent); font-size: 0.9em; margin-top: 8px; }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            transform: rotate(30deg) scale(1.1);
            border-color: var(--accent);
        }

        /* 分类导航 */
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--bg-nav);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .cat-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cat-btn:hover { background: rgba(59, 130, 246, 0.1); color: var(--text-primary); }
        .cat-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            border-color: transparent;
        }
        .cat-btn .count {
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        /* 分类区块 */
        .category-section {
            margin-bottom: 40px;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        .category-icon { font-size: 1.8em; }
        .category-title { font-size: 1.4em; font-weight: bold; }
        .category-count { color: var(--text-secondary); font-size: 0.9em; }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-color, #00d4ff), transparent);
        }
        .project-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--card-color, #00d4ff);
        }
        .project-icon { font-size: 2em; margin-bottom: 10px; }
        .project-title { font-size: 1.1em; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .project-desc { color: #8892b0; font-size: 0.85em; line-height: 1.5; margin-bottom: 12px; }
        .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75em;
        }

        .add-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }
        .add-card:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
        .add-card .icon { font-size: 2.5em; margin-bottom: 10px; opacity: 0.5; }
        .add-card .text { color: #8892b0; font-size: 0.9em; }

        .delete-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(255, 0, 0, 0.2);
            border: none;
            color: #ff6b6b;
            width: 26px; height: 26px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        .project-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255, 0, 0, 0.4); }

        .prompt-btn {
            position: absolute;
            top: 8px; right: 40px;
            background: rgba(0, 212, 255, 0.2);
            border: none;
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            font-size: 0.7em;
        }
        .project-card:hover .prompt-btn { opacity: 1; }
        .prompt-btn:hover { background: rgba(0, 212, 255, 0.4); }

        .user-section-title {
            color: #ffd700;
            font-size: 0.85em;
            margin: 25px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 25px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: #00d4ff; font-size: 1.2em; }
        .close-btn {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 1.5em;
            cursor: pointer;
        }
        .close-btn:hover { color: #fff; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: #8892b0;
            margin-bottom: 6px;
            font-size: 0.85em;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95em;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 150px;
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #8892b0; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .file-input-wrapper { position: relative; display: inline-block; width: 100%; }
        .file-input-wrapper input[type="file"] { display: none; }
        .file-input-label {
            display: block;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            color: #8892b0;
            transition: all 0.3s;
        }
        .file-input-label:hover { border-color: #00d4ff; color: #00d4ff; }

        /* 对话框 */
        .dialog-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .dialog-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dialog-box {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 16px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .dialog-icon { font-size: 2.5em; margin-bottom: 12px; }
        .dialog-title { font-size: 1.2em; color: #fff; margin-bottom: 8px; }
        .dialog-message { color: #8892b0; margin-bottom: 20px; line-height: 1.5; }
        .dialog-buttons { display: flex; gap: 10px; justify-content: center; }
        .dialog-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s;
        }
        .dialog-btn-confirm { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; }
        .dialog-btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4); }
        .dialog-btn-cancel { background: rgba(255, 255, 255, 0.1); color: #8892b0; }
        .dialog-btn-cancel:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
        .dialog-btn-ok { background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: #fff; min-width: 100px; }
        .dialog-btn-ok:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4); }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 10px;
            padding: 12px 25px;
            color: #fff;
            font-size: 0.95em;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(56, 239, 125, 0.5); }
        .toast.error { border-color: rgba(255, 107, 107, 0.5); }
        .toast.warning { border-color: rgba(255, 215, 0, 0.5); }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #8892b0;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.6em; }
            .projects-grid { grid-template-columns: 1fr; }
            .category-nav { gap: 6px; }
            .cat-btn { padding: 8px 14px; font-size: 0.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            <h1>🎨 HTML 互动项目展示</h1>
            <p class="subtitle">点击卡片进入对应项目 | 纯前端实现，无需服务器</p>
            <p class="stats" id="statsInfo"></p>
        </header>
        <nav class="category-nav" id="categoryNav"></nav>
        <main id="projectsContainer"></main>
        <footer>
            <p>💡 点击"添加项目"卡片可导入自定义HTML项目</p>
        </footer>
    </div>

    <!-- 添加项目模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ 添加新项目</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="form-group">
                <label>项目名称</label>
                <input type="text" id="projectTitle" placeholder="例如：我的动画项目">
            </div>
            <div class="form-group">
                <label>项目简介</label>
                <input type="text" id="projectDesc" placeholder="一句话描述这个项目">
            </div>
            <div class="form-group">
                <label>项目图标 (Emoji)</label>
                <input type="text" id="projectIcon" placeholder="例如：🎮" maxlength="2">
            </div>
            <div class="form-group">
                <label>导入HTML文件</label>
                <div class="file-input-wrapper">
                    <input type="file" id="htmlFile" accept=".html,.htm">
                    <label class="file-input-label" for="htmlFile">📁 点击选择HTML文件或拖拽到此处</label>
                </div>
            </div>
            <div class="form-group">
                <label>或直接粘贴HTML代码 <span style="color:#8892b0;font-size:0.85em">(限制 100KB)</span></label>
                <textarea id="htmlCode" placeholder="&lt;!DOCTYPE html&gt;&#10;&lt;html&gt;&#10;..." maxlength="102400"></textarea>
                <div style="text-align:right;color:#8892b0;font-size:0.75em;margin-top:4px;">
                    <span id="codeSize">0</span> / 100 KB
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存项目</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="dialog-overlay" id="confirmDialog">
        <div class="dialog-box">
            <div class="dialog-icon" id="dialogIcon">⚠️</div>
            <div class="dialog-title" id="dialogTitle">确认操作</div>
            <div class="dialog-message" id="dialogMessage">确定要执行此操作吗？</div>
            <div class="dialog-buttons">
                <button class="dialog-btn dialog-btn-cancel" id="dialogCancel">取消</button>
                <button class="dialog-btn dialog-btn-confirm" id="dialogConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 提示对话框 -->
    <div class="dialog-overlay" id="alertDialog">
        <div class="dialog-box">
            <div class="dialog-icon" id="alertIcon">✅</div>
            <div class="dialog-title" id="alertTitle">提示</div>
            <div class="dialog-message" id="alertMessage">操作成功！</div>
            <div class="dialog-buttons">
                <button class="dialog-btn dialog-btn-ok" id="alertOk">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">操作成功</span>
    </div>

    <!-- 提示词模态框 -->
    <div class="modal" id="promptModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>📝 <span id="promptModalTitle">提示词</span></h2>
                <button class="close-btn" id="closePromptModal">&times;</button>
            </div>
            <div id="promptViewMode">
                <div id="promptContent" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 16px; white-space: pre-wrap; line-height: 1.8; font-size: 0.9em; max-height: 400px; overflow-y: auto;"></div>
                <div class="btn-group" style="margin-top: 16px;">
                    <button class="btn btn-secondary" id="editPromptBtn">✏️ 编辑</button>
                    <button class="btn btn-secondary" id="copyPromptBtn">📋 复制</button>
                </div>
            </div>
            <div id="promptEditMode" style="display: none;">
                <div class="form-group">
                    <label>输入提示词（支持Markdown格式，会自动排版）</label>
                    <textarea id="promptInput" style="min-height: 300px;" placeholder="请输入该项目的提示词..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="cancelPromptBtn">取消</button>
                    <button class="btn btn-primary" id="savePromptBtn">💾 保存提示词</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        // ========== 对话框系统 ==========
        const Dialog = {
            confirm(options) {
                return new Promise((resolve) => {
                    const overlay = document.getElementById('confirmDialog');
                    document.getElementById('dialogIcon').textContent = options.icon || '⚠️';
                    document.getElementById('dialogTitle').textContent = options.title || '确认操作';
                    document.getElementById('dialogMessage').textContent = options.message || '确定要执行此操作吗？';
                    const confirmBtn = document.getElementById('dialogConfirm');
                    const cancelBtn = document.getElementById('dialogCancel');
                    confirmBtn.textContent = options.confirmText || '确定';
                    cancelBtn.textContent = options.cancelText || '取消';
                    overlay.classList.add('show');
                    const handleConfirm = () => { overlay.classList.remove('show'); cleanup(); resolve(true); };
                    const handleCancel = () => { overlay.classList.remove('show'); cleanup(); resolve(false); };
                    const handleOverlay = (e) => { if (e.target === overlay) handleCancel(); };
                    const cleanup = () => {
                        confirmBtn.removeEventListener('click', handleConfirm);
                        cancelBtn.removeEventListener('click', handleCancel);
                        overlay.removeEventListener('click', handleOverlay);
                    };
                    confirmBtn.addEventListener('click', handleConfirm);
                    cancelBtn.addEventListener('click', handleCancel);
                    overlay.addEventListener('click', handleOverlay);
                });
            },
            alert(options) {
                return new Promise((resolve) => {
                    const overlay = document.getElementById('alertDialog');
                    document.getElementById('alertIcon').textContent = options.icon || '✅';
                    document.getElementById('alertTitle').textContent = options.title || '提示';
                    document.getElementById('alertMessage').textContent = options.message || '操作完成';
                    overlay.classList.add('show');
                    const okBtn = document.getElementById('alertOk');
                    const handleOk = () => { overlay.classList.remove('show'); okBtn.removeEventListener('click', handleOk); overlay.removeEventListener('click', handleOverlay); resolve(); };
                    const handleOverlay = (e) => { if (e.target === overlay) handleOk(); };
                    okBtn.addEventListener('click', handleOk);
                    overlay.addEventListener('click', handleOverlay);
                });
            },
            toast(message, type = 'success', duration = 3000) {
                const toast = document.getElementById('toast');
                const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
                document.getElementById('toastIcon').textContent = icons[type] || icons.success;
                document.getElementById('toastMessage').textContent = message;
                toast.className = 'toast ' + type;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, duration);
            }
        };

        // ========== 分类定义 ==========
        const categories = {
            all: { name: '全部', icon: '📚', color: '#00d4ff' },
            physics: { name: '物理模拟', icon: '⚛️', color: '#00ffff' },
            sports: { name: '运动科学', icon: '🏃', color: '#7fff7f' },
            biology: { name: '生命科学', icon: '🧬', color: '#ff6b6b' },
            engineering: { name: '工程技术', icon: '⚙️', color: '#ffd700' },
            algorithm: { name: '算法可视化', icon: '🧮', color: '#a78bfa' },
            art: { name: '艺术创意', icon: '🎨', color: '#ff69b4' },
            history: { name: '历史人文', icon: '📜', color: '#d4a574' },
            environment: { name: '环境地球', icon: '🌍', color: '#4caf50' },
            life: { name: '生活工具', icon: '🏠', color: '#4fc3f7' },
            game: { name: '游戏教育', icon: '🎮', color: '#ff9800' },
            web: { name: '网页模板', icon: '🌐', color: '#2196f3' }
        };

        // ========== 项目数据（按分类） ==========
        const builtInProjects = [

        // ========== GitHub 配置 ==========
        const GITHUB_CONFIG = {
            owner: 'alanttor',
            repo: 'ai-game',
            path: 'prompt-word-demo/data/projects.json',
            token: '%%GITHUB_TOKEN%%'
        };
        const USE_GITHUB_STORAGE = GITHUB_CONFIG.token !== '' && !GITHUB_CONFIG.token.includes('%%');

        // ========== 存储层 ==========
        const Storage = {
            fileSha: null,
            async getProjects() {
                if (!USE_GITHUB_STORAGE) {
                    const data = localStorage.getItem('userProjects');
                    return data ? JSON.parse(data) : [];
                }
                try {
                    const encodedPath = encodeURIComponent(GITHUB_CONFIG.path).replace(/%2F/g, '/');
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${encodedPath}`, {
                        headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (!res.ok) { if (res.status === 404) return []; throw new Error('获取数据失败'); }
                    const data = await res.json();
                    this.fileSha = data.sha;
                    return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                } catch (error) {
                    console.error('GitHub 读取失败:', error);
                    Dialog.toast('云端读取失败，使用本地数据', 'warning');
                    const data = localStorage.getItem('userProjects');
                    return data ? JSON.parse(data) : [];
                }
            },
            async saveProjects(projects) {
                localStorage.setItem('userProjects', JSON.stringify(projects));
                if (!USE_GITHUB_STORAGE) return true;
                try {
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(projects, null, 2))));
                    const body = { message: `更新项目数据 - ${new Date().toLocaleString('zh-CN')}`, content: content, branch: 'master' };
                    if (this.fileSha) body.sha = this.fileSha;
                    const encodedPath = encodeURIComponent(GITHUB_CONFIG.path).replace(/%2F/g, '/');
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${encodedPath}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error('保存失败');
                    const data = await res.json();
                    this.fileSha = data.content.sha;
                    return true;
                } catch (error) {
                    console.error('GitHub 保存失败:', error);
                    Dialog.toast('云端保存失败，已保存到本地', 'warning');
                    return false;
                }
            }
        };

        let userProjectsCache = [];
        let currentCategory = 'all';

        async function loadUserProjects() { userProjectsCache = await Storage.getProjects(); return userProjectsCache; }
        function getUserProjects() { return userProjectsCache; }
        async function saveUserProjects(projects) { userProjectsCache = projects; await Storage.saveProjects(projects); }
        async function addUserProject(project) {
            const projects = getUserProjects();
            project.id = Date.now();
            project.createdAt = new Date().toISOString();
            projects.push(project);
            await saveUserProjects(projects);
            renderProjects();
        }
        async function deleteUserProject(id) {
            const projects = getUserProjects().filter(p => p.id !== id);
            await saveUserProjects(projects);
            renderProjects();
        }

        // ========== 渲染分类导航 ==========
        function renderCategoryNav() {
            const nav = document.getElementById('categoryNav');
            const counts = { all: builtInProjects.length };
            
            builtInProjects.forEach(p => {
                counts[p.category] = (counts[p.category] || 0) + 1;
            });
            
            nav.innerHTML = Object.entries(categories).map(([key, cat]) => `
                <button class="cat-btn ${currentCategory === key ? 'active' : ''}" onclick="selectCategory('${key}')">
                    <span>${cat.icon}</span>
                    <span>${cat.name}</span>
                    <span class="count">${counts[key] || 0}</span>
                </button>
            `).join('');
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderCategoryNav();
            renderProjects();
        }

        // ========== 渲染项目 ==========
        async function renderProjects() {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#8892b0;">加载中...</div>';

            if (userProjectsCache.length === 0) await loadUserProjects();

            let html = '';
            
            if (currentCategory === 'all') {
                // 按分类分组显示
                Object.entries(categories).forEach(([catKey, cat]) => {
                    if (catKey === 'all') return;
                    const catProjects = builtInProjects.filter(p => p.category === catKey);
                    if (catProjects.length === 0) return;
                    
                    html += `
                        <section class="category-section">
                            <div class="category-header" style="border-color: ${cat.color};">
                                <span class="category-icon">${cat.icon}</span>
                                <span class="category-title" style="color: ${cat.color};">${cat.name}</span>
                                <span class="category-count">(${catProjects.length}个项目)</span>
                            </div>
                            <div class="projects-grid">
                                ${catProjects.map(p => createProjectCardHTML(p, false)).join('')}
                            </div>
                        </section>
                    `;
                });
            } else {
                // 显示单个分类
                const cat = categories[currentCategory];
                const catProjects = builtInProjects.filter(p => p.category === currentCategory);
                
                html += `
                    <section class="category-section">
                        <div class="category-header" style="border-color: ${cat.color};">
                            <span class="category-icon">${cat.icon}</span>
                            <span class="category-title" style="color: ${cat.color};">${cat.name}</span>
                            <span class="category-count">(${catProjects.length}个项目)</span>
                        </div>
                        <div class="projects-grid">
                            ${catProjects.map(p => createProjectCardHTML(p, false)).join('')}
                        </div>
                    </section>
                `;
            }

            // 用户项目
            const userProjects = getUserProjects();
            if (userProjects.length > 0) {
                html += `
                    <div class="user-section-title">📦 社区项目 (${userProjects.length})</div>
                    <div class="projects-grid">
                        ${userProjects.map(p => createProjectCardHTML(p, true)).join('')}
                    </div>
                `;
            }

            // 添加项目卡片
            html += `
                <div class="projects-grid" style="margin-top: 20px;">
                    <div class="add-card" onclick="document.getElementById('addModal').classList.add('show')">
                        <div class="icon">➕</div>
                        <div class="text">添加新项目</div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            
            // 绑定删除按钮事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const project = userProjects.find(p => p.id === id);
                    const confirmed = await Dialog.confirm({
                        icon: '🗑️',
                        title: '删除项目',
                        message: `确定要删除「${project?.title}」吗？此操作无法撤销。`,
                        confirmText: '删除',
                        cancelText: '取消'
                    });
                    if (confirmed) {
                        deleteUserProject(id);
                        Dialog.toast('项目已删除', 'success');
                    }
                });
            });

            // 绑定提示词按钮事件
            bindPromptButtons();

            // 更新统计
            document.getElementById('statsInfo').textContent = `共 ${builtInProjects.length} 个内置项目，${Object.keys(categories).length - 1} 个分类`;
        }

        function createProjectCardHTML(project, isUserProject) {
            const deleteBtn = isUserProject ? `<button class="delete-btn" data-id="${project.id}">×</button>` : '';
            const promptBtn = `<button class="prompt-btn" data-title="${project.title}">📝 提示词</button>`;
            return `
                <div class="project-card" style="--card-color: ${project.color || '#00d4ff'};" 
                     data-file="${project.file || ''}" data-user="${isUserProject}" data-id="${project.id || ''}" data-title="${project.title}">
                    ${deleteBtn}
                    ${promptBtn}
                    <div class="project-icon">${project.icon}</div>
                    <div class="project-title">${project.title}</div>
                    <div class="project-desc">${project.desc}</div>
                    <div class="project-tags">
                        ${(project.tags || ['自定义']).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        // ========== 模态框逻辑 ==========
        const modal = document.getElementById('addModal');
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('show'));
        document.getElementById('cancelBtn').addEventListener('click', () => modal.classList.remove('show'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

        // ========== 提示词功能 ==========
        let promptsData = [];
        let currentPromptTitle = '';
        let promptsFileSha = null;
        const promptModal = document.getElementById('promptModal');
        const promptViewMode = document.getElementById('promptViewMode');
        const promptEditMode = document.getElementById('promptEditMode');
        const promptContent = document.getElementById('promptContent');
        const promptInput = document.getElementById('promptInput');

        // 提示词存储配置（使用与用户项目相同的GitHub配置）
        const PROMPTS_CONFIG = {
            owner: 'alanttor',
            repo: 'ai-game',
            path: 'prompt-word-demo/data/prompts.json',
            token: '%%GITHUB_TOKEN%%'
        };
        const USE_GITHUB_PROMPTS = PROMPTS_CONFIG.token !== '' && !PROMPTS_CONFIG.token.includes('%%');

        // 加载提示词数据
        async function loadPrompts() {
            // 优先从GitHub API加载（需要Token）
            if (USE_GITHUB_PROMPTS) {
                try {
                    const encodedPath = encodeURIComponent(PROMPTS_CONFIG.path).replace(/%2F/g, '/');
                    const res = await fetch(`https://api.github.com/repos/${PROMPTS_CONFIG.owner}/${PROMPTS_CONFIG.repo}/contents/${encodedPath}`, {
                        headers: { 'Authorization': `token ${PROMPTS_CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        promptsFileSha = data.sha;
                        promptsData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                        console.log('从GitHub API加载提示词成功:', promptsData.length, '条');
                        return;
                    }
                } catch (e) {
                    console.log('GitHub API加载失败:', e.message);
                }
            }
            
            // 尝试从GitHub raw文件加载（无需Token，公开仓库可用）
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${PROMPTS_CONFIG.owner}/${PROMPTS_CONFIG.repo}/master/${PROMPTS_CONFIG.path}`);
                if (res.ok) {
                    promptsData = await res.json();
                    console.log('从GitHub Raw加载提示词成功:', promptsData.length, '条');
                    return;
                }
            } catch (e) {
                console.log('GitHub Raw加载失败:', e.message);
            }
            
            // 从本地JSON文件加载（需要HTTP服务器）
            try {
                const res = await fetch('data/prompts.json');
                if (res.ok) {
                    promptsData = await res.json();
                    console.log('从本地文件加载提示词成功:', promptsData.length, '条');
                    return;
                }
            } catch (e) {
                console.log('本地文件加载失败:', e.message);
            }
            
            // 最后从localStorage加载
            const localData = localStorage.getItem('promptsData');
            if (localData) {
                promptsData = JSON.parse(localData);
                console.log('从localStorage加载提示词:', promptsData.length, '条');
            } else {
                promptsData = [];
                console.log('无提示词数据');
            }
        }

        // 保存提示词到GitHub
        async function savePromptsToGitHub() {
            if (!USE_GITHUB_PROMPTS) {
                // 仅保存到localStorage
                localStorage.setItem('promptsData', JSON.stringify(promptsData));
                return true;
            }
            
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(promptsData, null, 2))));
                const body = { 
                    message: `更新提示词 - ${new Date().toLocaleString('zh-CN')}`, 
                    content: content, 
                    branch: 'master' 
                };
                if (promptsFileSha) body.sha = promptsFileSha;
                
                const encodedPath = encodeURIComponent(PROMPTS_CONFIG.path).replace(/%2F/g, '/');
                const res = await fetch(`https://api.github.com/repos/${PROMPTS_CONFIG.owner}/${PROMPTS_CONFIG.repo}/contents/${encodedPath}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${PROMPTS_CONFIG.token}`, 
                        'Accept': 'application/vnd.github.v3+json', 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(body)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    promptsFileSha = data.content.sha;
                    // 同时保存到localStorage作为备份
                    localStorage.setItem('promptsData', JSON.stringify(promptsData));
                    return true;
                }
                throw new Error('保存失败');
            } catch (e) {
                console.error('GitHub保存失败:', e);
                // 降级到localStorage
                localStorage.setItem('promptsData', JSON.stringify(promptsData));
                return false;
            }
        }

        // 格式化提示词（自动排版）
        function formatPrompt(text) {
            if (!text) return '';
            // 处理Markdown格式
            let formatted = text
                .replace(/\n{3,}/g, '\n\n')  // 多个换行合并为两个
                .replace(/^(#{1,6})\s*(.+)$/gm, '<strong style="color:#00d4ff;font-size:1.1em;">$2</strong>')  // 标题
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')  // 粗体
                .replace(/\*(.+?)\*/g, '<em>$1</em>')  // 斜体
                .replace(/`(.+?)`/g, '<code style="background:rgba(0,212,255,0.2);padding:2px 6px;border-radius:4px;">$1</code>')  // 行内代码
                .replace(/^\* /gm, '• ')  // 无序列表
                .replace(/^\d+\.\s/gm, (match) => match)  // 有序列表保持
                .replace(/\n/g, '<br>');  // 换行
            return formatted;
        }

        // 查找提示词
        function findPrompt(title) {
            return promptsData.find(p => p.title === title);
        }

        // 打开提示词模态框
        function openPromptModal(title) {
            currentPromptTitle = title;
            document.getElementById('promptModalTitle').textContent = `提示词 - ${title}`;
            
            const prompt = findPrompt(title);
            if (prompt && prompt.prompt) {
                promptContent.innerHTML = formatPrompt(prompt.prompt);
                promptViewMode.style.display = 'block';
                promptEditMode.style.display = 'none';
            } else {
                promptInput.value = '';
                promptViewMode.style.display = 'none';
                promptEditMode.style.display = 'block';
            }
            
            promptModal.classList.add('show');
        }

        // 关闭提示词模态框
        document.getElementById('closePromptModal').addEventListener('click', () => {
            promptModal.classList.remove('show');
        });
        promptModal.addEventListener('click', (e) => {
            if (e.target === promptModal) promptModal.classList.remove('show');
        });

        // 编辑按钮
        document.getElementById('editPromptBtn').addEventListener('click', () => {
            const prompt = findPrompt(currentPromptTitle);
            promptInput.value = prompt ? prompt.prompt : '';
            promptViewMode.style.display = 'none';
            promptEditMode.style.display = 'block';
        });

        // 复制按钮
        document.getElementById('copyPromptBtn').addEventListener('click', async () => {
            const prompt = findPrompt(currentPromptTitle);
            if (prompt && prompt.prompt) {
                try {
                    await navigator.clipboard.writeText(prompt.prompt);
                    Dialog.toast('提示词已复制到剪贴板', 'success');
                } catch (e) {
                    Dialog.toast('复制失败', 'error');
                }
            }
        });

        // 取消编辑
        document.getElementById('cancelPromptBtn').addEventListener('click', () => {
            const prompt = findPrompt(currentPromptTitle);
            if (prompt && prompt.prompt) {
                promptViewMode.style.display = 'block';
                promptEditMode.style.display = 'none';
            } else {
                promptModal.classList.remove('show');
            }
        });

        // 保存提示词
        document.getElementById('savePromptBtn').addEventListener('click', async () => {
            const text = promptInput.value.trim();
            if (!text) {
                await Dialog.alert({ icon: '⚠️', title: '提示', message: '请输入提示词内容' });
                return;
            }

            // 更新或添加提示词
            const existingIndex = promptsData.findIndex(p => p.title === currentPromptTitle);
            if (existingIndex >= 0) {
                promptsData[existingIndex].prompt = text;
            } else {
                promptsData.push({ title: currentPromptTitle, prompt: text });
            }

            // 保存到GitHub或localStorage
            const saved = await savePromptsToGitHub();
            
            // 显示格式化后的内容
            promptContent.innerHTML = formatPrompt(text);
            promptViewMode.style.display = 'block';
            promptEditMode.style.display = 'none';

            if (saved && USE_GITHUB_PROMPTS) {
                Dialog.toast('提示词已保存到云端', 'success');
            } else if (saved) {
                Dialog.toast('提示词已保存到本地', 'success');
            } else {
                Dialog.toast('云端保存失败，已保存到本地', 'warning');
            }
        });

        // 绑定提示词按钮事件
        function bindPromptButtons() {
            document.querySelectorAll('.prompt-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const title = btn.dataset.title;
                    openPromptModal(title);
                });
            });
        }

        // 初始化时加载提示词
        async function initPrompts() {
            await loadPrompts();
        }

        const htmlFile = document.getElementById('htmlFile');
        const htmlCode = document.getElementById('htmlCode');
        const fileLabel = document.querySelector('.file-input-label');

        htmlFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 100 * 1024) {
                    Dialog.alert({ icon: '⚠️', title: '文件过大', message: `文件大小 ${(file.size/1024).toFixed(1)}KB 超过限制（100KB）` });
                    return;
                }
                fileLabel.textContent = `✅ 已选择: ${file.name} (${(file.size/1024).toFixed(1)}KB)`;
                const reader = new FileReader();
                reader.onload = (e) => { htmlCode.value = e.target.result; updateCodeSize(); };
                reader.readAsText(file);
            }
        });

        function updateCodeSize() {
            const size = new Blob([htmlCode.value]).size;
            document.getElementById('codeSize').textContent = (size / 1024).toFixed(1);
            document.getElementById('codeSize').style.color = size > 100 * 1024 ? '#ff6b6b' : '#8892b0';
        }
        htmlCode.addEventListener('input', updateCodeSize);

        fileLabel.addEventListener('dragover', (e) => { e.preventDefault(); fileLabel.style.borderColor = '#00d4ff'; });
        fileLabel.addEventListener('dragleave', () => { fileLabel.style.borderColor = ''; });
        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.html') || file.name.endsWith('.htm'))) {
                fileLabel.textContent = `✅ 已选择: ${file.name}`;
                const reader = new FileReader();
                reader.onload = (e) => { htmlCode.value = e.target.result; updateCodeSize(); };
                reader.readAsText(file);
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const title = document.getElementById('projectTitle').value.trim();
            const desc = document.getElementById('projectDesc').value.trim();
            const icon = document.getElementById('projectIcon').value.trim() || '📄';
            const code = htmlCode.value.trim();

            if (!title) { await Dialog.alert({ icon: '⚠️', title: '缺少信息', message: '请输入项目名称' }); return; }
            if (!code) { await Dialog.alert({ icon: '⚠️', title: '缺少内容', message: '请导入HTML文件或粘贴HTML代码' }); return; }

            const codeSize = new Blob([code]).size;
            if (codeSize > 100 * 1024) {
                await Dialog.alert({ icon: '⚠️', title: '内容过大', message: `HTML内容 ${(codeSize/1024).toFixed(1)}KB 超过限制（100KB）` });
                return;
            }

            if (!code.includes('<html') && !code.includes('<body') && !code.includes('<div')) {
                const confirmed = await Dialog.confirm({
                    icon: '🤔', title: 'HTML格式检查',
                    message: '代码似乎不是完整的HTML，确定要继续保存吗？',
                    confirmText: '继续保存', cancelText: '返回修改'
                });
                if (!confirmed) return;
            }

            const project = { title, desc: desc || '用户自定义项目', icon, color: '#ffd700', tags: ['自定义'], htmlContent: code };
            await addUserProject(project);

            document.getElementById('projectTitle').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectIcon').value = '';
            htmlCode.value = '';
            fileLabel.textContent = '📁 点击选择HTML文件或拖拽到此处';
            modal.classList.remove('show');
            await Dialog.alert({ icon: '🎉', title: '添加成功', message: `项目「${title}」已成功添加！` });
        });

        // 初始化
        (async function init() {
            await initPrompts();
            renderCategoryNav();
            renderProjects();
        })();

        // ========== 主题切换 ==========
        const themeToggle = document.getElementById('themeToggle');
        let currentTheme = localStorage.getItem('theme') || 'dark';
        
        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
            }
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }
        
        applyTheme(currentTheme);
        
        themeToggle.addEventListener('click', () => {
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // 修改项目跳转，传递主题参数
        document.getElementById('projectsContainer').addEventListener('click', (e) => {
            const card = e.target.closest('.project-card');
            if (!card || e.target.classList.contains('delete-btn') || e.target.classList.contains('prompt-btn')) return;
            
            const file = card.dataset.file;
            const isUser = card.dataset.user === 'true';
            
            if (isUser) {
                const project = getUserProjects().find(p => p.id == card.dataset.id);
                if (project?.htmlContent) {
                    const blob = new Blob([project.htmlContent], { type: 'text/html' });
                    window.open(URL.createObjectURL(blob), '_blank');
                }
            } else if (file) {
                window.location.href = file + '?theme=' + currentTheme;
            }
        });
    </script>
</body>
</html>
